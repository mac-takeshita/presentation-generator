slides:
  - id: title
    title: |-
      生成AIで
      医療者教育用動画を生成してみよう
    subtitle: ワークショップ事前動画（約5分）
    presenter: 第58回日本医学教育学会大会　2026年7月31日
    narration: |
      こんにちは。このワークショップ「生成AIで医療者教育用動画を生成してみよう」の事前動画をご覧いただきありがとうございます。当日までに知っておいていただきたい背景知識と準備事項をお伝えします。約5分の動画です。

  - id: background
    title: "背景：なぜ今、生成AIで教材を作るのか"
    subtitle: 医療者教育が直面する3つの課題
    cards:
      - heading: 知識量の増大と認知負荷
        body: 医学知識の量と複雑性は、ワーキングメモリの限界を超えやすい
        detail: テキスト中心の教材だけでは認知負荷が高くなりがち
        cites: [mehta-2025]
      - heading: 教育者の時間的制約
        body: 臨床業務と教材作成の両立は困難
        detail: |-
          MCQ作成：従来30〜60分
          → GenAIで5〜15分に短縮
          の報告あり
        cites: [basil-2026]
      - heading: マルチモーダル学習
        body: 音声・動画など複数チャネルの活用で理解を促進
        detail: 二重符号化理論・マルチメディア学習理論に基づく
        cites: [mehta-2025, paudel-2025]
    narration: |
      なぜ今、生成AIで教材を作ることが注目されているのでしょうか。3つの課題があります。まず、医学知識の量と複雑性は年々増大し、ワーキングメモリの限界を超えやすくなっています。テキスト中心の教材だけでは、認知負荷が高くなりがちです。次に、教育者は臨床業務と教材作成の両立に時間的制約を抱えています。ある研究では、多肢選択問題の作成に従来30分から60分かかっていた作業が、生成AIで5分から15分に短縮されたと報告されています。そして、音声や動画など複数のチャネルを使ったマルチモーダル学習が、理解を促進することが知られています。これは二重符号化理論やマルチメディア学習理論に基づく知見です。

  - id: notebooklm
    title: NotebookLMとは
    subtitle: Google提供の無料AIツール
    features:
      - PDFなどの資料をアップロードして「ソース」として教材を生成
      - スライド、音声（ポッドキャスト形式）、小テスト、FAQなど多様な出力形式
      - プログラミング不要で利用可能
      - "2026年3月時点：Excel・PowerPointは未対応"
    evidence:
      - heading: 薬理学（医学部）
        body: 10本のAIポッドキャストを補助教材として提供
        cite: paudel-2025
      - heading: 循環器内科（研修医）
        body: 音声要約と論文精読を比較するRCT実施中
        cite: stadler-2025
      - heading: 心血管看護
        body: 参加者の約半数がAI生成と見抜けなかった
        cite: desmedt-2025
    url: notebooklm.google.com
    narration: |
      今回のワークショップで使うNotebookLMについてご紹介します。NotebookLMは、Googleが提供する無料のAIツールです。PDFなどの資料をアップロードし、それらをソースとしてスライド、音声教材、小テスト、FAQなど多様な形式の教材を生成できます。プログラミングは不要で、誰でもすぐに使い始められます。実際の教育活用も報告されており、例えば医学部の薬理学で10本のAIポッドキャストが補助教材として提供された事例や、循環器内科で音声要約と論文精読を比較するランダム化比較試験が進行中です。また、心血管看護の研究では、参加者の約半数がAI生成の教材であることを見抜けなかったという報告もあります。

  - id: steps-overview
    title: 教材作成の7ステップ
    subtitle: ワークショップで実践する流れ
    steps:
      - 十分な資料を集める
      - 著作権を確認する
      - NotebookLMにアップロード
      - 資料選択と出力種別選択
      - カスタム指示を記載(5W1H)
      - 内容確認・微修正を繰り返す
      - 最終確認
    note: ※ 当日はこの流れに沿って、実際にNotebookLMで教材を作成します
    narration: |
      ワークショップでは、7つのステップに沿って教材を作成します。それぞれのステップを、実際の操作画面を見ながら確認していきましょう。

  - id: step-1
    title: 十分な資料を集める
    screenshot: 01_資料収集_reviewed.png
    note: "例：ChatGPTのDeep Researchで関連資料を網羅的に収集"
    narration: |
      最初のステップは、資料の収集です。こちらはChatGPTのDeep Research機能を使って、テーマに関連する資料を網羅的に集めている画面です。AIを活用すると、短時間で幅広い資料を収集できます。質の高い教材を作るためには、まず十分なソース資料を揃えることが重要です。

  - id: step-2
    title: 著作権を確認する
    screenshot: 02_著作権確認_reviewed.png
    note: 公的機関のオープンデータ利用規約など、資料の利用条件を事前に確認
    narration: |
      次に、集めた資料の著作権を確認します。こちらはデジタル庁の公共データ利用規約のページです。公的機関が公開している資料の多くはオープンデータとして二次利用が可能ですが、それぞれの利用条件を必ず確認するようにしましょう。

  - id: step-3
    title: NotebookLMにアップロード
    screenshot: 03_NotebookLMへアップロード_reviewed.png
    note: 収集した資料（PDF等）をNotebookLMのソースとしてアップロード
    narration: |
      3番目のステップでは、著作権を確認した資料をNotebookLMにアップロードします。こちらの画面のように、ファイルを選択してアップロードするだけです。PDF、画像、ウェブサイトのURLなど、さまざまな形式に対応しています。

  - id: step-4
    title: 資料選択と出力種別選択
    screenshot: 04_資料選択と出力種別選択_reviewed.png
    note: 使用するソースを選択し、動画解説・音声解説・クイズ等の出力形式を指定
    narration: |
      4番目のステップでは、アップロードしたソースの中から使用する資料を選び、出力の形式を指定します。画面右側のStudioパネルには、動画解説、音声解説、マインドマップ、クイズなど、多彩な出力形式が用意されています。

  - id: step-5
    title: カスタム指示を記載（5W1H）
    screenshot: 05_カスタム指示入力_reviewed.png
    note: ビジュアルスタイルの選択と、具体的なカスタム指示の入力
    narration: |
      5番目のステップが特に重要です。出力形式を選んだ後、カスタム指示を具体的に記載します。ビジュアルスタイルを選択し、対象者は誰か、何を伝えたいか、どのような場面で使うかなど、5W1Hを意識して指示を書くことで、より適切な教材が生成されます。

  - id: step-6
    title: 内容確認・微修正を繰り返す
    screenshot: 06_内容確認と微修正.jpg
    note: 生成された教材の内容を確認し、必要に応じて修正・再生成
    narration: |
      6番目のステップでは、生成された教材の内容を丁寧に確認します。こちらは生成された学習資料をPDFで表示して確認している画面です。事実関係の正確性や表現の適切さをチェックし、必要に応じてカスタム指示を修正して再生成を繰り返します。

  - id: step-7
    title: 最終確認
    screenshot: 07_最終確認.jpg
    note: 完成した教材をプレビューし、品質を最終チェック
    narration: |
      最後のステップは、完成した教材の最終確認です。こちらはNotebookLMが生成した動画教材のプレビュー画面です。全体の流れや内容が目的に合っているか、最終チェックを行って完成です。

  - id: risks
    title: リスクと品質管理
    risks_heading: 留意すべきリスク
    risks:
      - heading: ハルシネーション
        body: もっともらしいが誤った記述が紛れ込む前提で確認する
        cites: [basil-2026, paudel-2025]
      - heading: バイアスの再生産
        body: 表現の多様性チェック・文化的感受性の確認が必要
        cites: [snchezmendiola-2025]
    solutions_heading: 対策のポイント
    solutions:
      - heading: 著作権への配慮
        body: 出典明示・引用の枠組み・CC*資料の活用
        footnote: "*クリエイティブ・コモンズ(CC)は、国際的非営利組織とそのプロジェクトの総称。インターネット時代のための新しい著作権ルールで、作者が利用条件を意思表示するツール。"
      - heading: 過度の依存を避ける
        body: AIに任せる部分と人が判断する部分の境界を意識的に設計
        cites: [alhur-2025]
    banner: AIは「下書き」を作るツール ― 教育者が吟味・修正して使う
    narration: |
      AI生成教材には、いくつかの留意すべきリスクがあります。もっともらしいが実は誤った記述、いわゆるハルシネーションが紛れ込むことがあります。また、バイアスの再生産や著作権の問題にも配慮が必要です。対策として重要なのは、AIは「下書き」を作るツールであるという認識です。教育者が内容を吟味し、修正してから使うという前提で活用しましょう。

  - id: preparation
    title: 事前準備のお願い
    subtitle: ワークショップ当日までにご準備ください
    items:
      - title: Googleアカウントを準備
        desc: できればGoogle AI Plus以上の有料プランを推奨（1200円/月）
      - title: NotebookLMに一度アクセス
        desc: 動作確認をしておいてください
        url: "https://notebooklm.google.com/"
      - title: テーマを1つ考えておく
        desc: 自分の教育場面で使いたいテーマ
      - title: 資料（PDF）を2〜3本用意（可能であれば）
        desc: そのテーマに関連する資料
        warning: 生成AIに学ばせることを拒否されていない資料限定！
    narration: |
      ワークショップ当日までに、4つの準備をお願いします。1つ目、NotebookLMの利用にはGoogleアカウントが必要です。できればGoogle AI Plus以上の有料プランをご準備ください。月額1200円で、より多くの機能をお使いいただけます。2つ目、ノートブック LM のウェブサイトに一度アクセスして、動作確認をしておいてください。URLはスライドに記載しています。3つ目、ご自身の教育場面で使いたいテーマを1つ考えておいてください。4つ目、可能であれば、そのテーマに関連する資料をPDFで2本から3本ご用意ください。ただし、生成AIに学ばせることが許可されている資料に限りますので、利用規約をご確認ください。

  - id: closing
    title: 当日の流れ
    timeline:
      - time: 導入
        duration: 10分
        desc: ツール紹介と目的共有
      - time: 実践
        duration: 35分
        desc: 7ステップに沿って教材作成
      - time: 共有
        duration: 15分
        desc: 成果物の共有とディスカッション
    closing_message: |-
      当日は、お持ちいただいた資料をもとに
      実際にNotebookLMで教材を作ってみましょう
    closing_sub: お会いできるのを楽しみにしています
    conference: 第58回日本医学教育学会大会　2026年7月31日
    narration: |
      当日は、まず10分間でツールの紹介と目的を共有します。続いて35分間の実践パートで、先ほどの7ステップに沿って実際に教材を作成していただきます。最後に15分間で、作成した教材を参加者同士で共有し、振り返りのディスカッションを行います。当日は、お持ちいただいた資料をもとに、実際にNotebookLMで教材を作ってみましょう。お会いできるのを楽しみにしています。

